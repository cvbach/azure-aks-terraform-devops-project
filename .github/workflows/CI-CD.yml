name: Build and Push Docker Image
on:
  workflow_dispatch:
env:
   ACR_NAME: acrdevopsprojectcvbach
   IMAGE_NAME: flask-aks
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      #CI
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: ACR Login
      run: az acr login --name acrdevopsprojectcvbach
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
    - name: Build Docker Image
      run: docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG ./app
    - name: List Images
      run: docker images
    - name: Push Docker Image
      run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG
      #CD
    - name: Get AKS Credentials
      run: az aks get-credentials  --resource-group cv.bach --name aks-devops-project --overwrite-existing
    - name: Verify AKS
      run: kubectl get nodes
    - name: Render Deployment Manifest
      run: |
       sed -i "s|REPLACE_IMAGE|$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG|g" kubernetes/deployment.yaml
    - name: Deploy to AKS
      run: kubectl apply -f kubernetes/deployment.yaml
    - name: Wait for Rollout
      run: kubectl rollout status deployment/flask-app -n devops-project
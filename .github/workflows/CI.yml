name: Build and Push Docker Image
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: flask-aks
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Verify Azure Login
      run: az account show
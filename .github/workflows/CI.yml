name: Build and Push Docker Image
on:
  push:
    branches:
      - main
env:
   ACR_NAME: acrdevopsprojectcvbach
   IMAGE_NAME: flask-aks
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Verify Azure Login
      run: az account show
    - name: ACR Login
      run: az acr login --name acrdevopsprojectcvbach
    - name: Verify ACR
      run: az acr repository list --name acrdevopsprojectcvbach
    - name: Build Docker Image
      run: docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} ./app
    - name: List Images
      run: docker images
    - name: Push Docker Image
      run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
    - name: Verify ACR
      run: az acr repository show-tags --name $ACR_NAME --repository $IMAGE_NAME
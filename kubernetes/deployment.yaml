apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: devops-project

spec:
  replicas: 3

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app

        image: REPLACE_IMAGE

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: flask-config

        - secretRef:
            name: flask-secret

        readinessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
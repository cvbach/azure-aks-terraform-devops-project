apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: devops-project

spec:
  replicas: 3

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app

        image: acrdevopsprojectcvbach.azurecr.io/flask-aks:v1

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: flask-config

        - secretRef:
            name: flask-secret

        readinessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 15
          periodSeconds: 10